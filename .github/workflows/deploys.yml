name: Deploy to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/vinamra26/wikipedia-rag-chatbot hf-space

          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            ./ hf-space/

          cd hf-space

          git add .

          git commit -m "Deploy from GitHub Actions" || echo "No changes"

          git push